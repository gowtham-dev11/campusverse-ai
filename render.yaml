# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the whole app (frontend + backend) as one Docker web service,
# using the root Dockerfile. See DEPLOYMENT.md for the full walkthrough.
#
# NOTE: this file is for the SINGLE-SERVICE deploy path only (one Render
# service serving both frontend + backend). It is NOT used for a split
# deploy (frontend on Vercel, backend on Render as its own service) —
# for that, create the backend Web Service manually in the Render
# dashboard instead of using this Blueprint. See DEPLOYMENT.md section 3.
#
# Database: this app uses Postgres (Neon), per backend/prisma/schema.prisma.
# No persistent disk is needed or used — Free-tier Render web services
# don't support persistent disks anyway (paid-plan only), which is another
# reason not to rely on local-file storage here.
services:
  - type: web
    name: campusverse-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # set your Neon Postgres connection string in the Render dashboard
      - key: JWT_SECRET
        sync: false # set your own long random value in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # set your own key in the Render dashboard — get one at https://aistudio.google.com/apikey
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: GEMINI_IMAGE_MODEL
        value: gemini-2.5-flash-image
